server:
  port: 8083

spring:
  application:
    name: example-spring-boot3
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# CSAP API Doc 配置
csap:
  apidoc:
    devtool:
      enabled: true
      cache: true
  # 验证框架配置
  validation:
    enabled: true

# Management Endpoints (Spring Boot 3.x 改进的 Actuator)
management:
  endpoints:
    web:
      exposure:
        include: "*"
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  health:
    defaults:
      enabled: true
  # Spring Boot 3.x 新增的 Observability 配置
  metrics:
    export:
      prometheus:
        enabled: false
  tracing:
    sampling:
      probability: 1.0

# Logging
logging:
  level:
    root: INFO
    ai.csap.apidoc: DEBUG
    com.csap.framework: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
