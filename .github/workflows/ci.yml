name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Java 8 dropped: maven-checkstyle-plugin 3.3.x ships checkstyle 10.x
        # which is compiled at class file version 55 (Java 11+). Spring Boot
        # 3.x in this repo also already requires Java 17+ at runtime.
        java: [ '11', '17', '21' ]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        cache: 'maven'
        
    - name: Build with Maven
      run: mvn -B clean install --file pom.xml
      
    - name: Run tests
      run: mvn -B test --file pom.xml
      
    - name: Generate test coverage report
      if: matrix.java == '17'
      run: mvn -B jacoco:report
      
    - name: Upload coverage to Codecov
      if: matrix.java == '17'
      uses: codecov/codecov-action@v3
      with:
        files: ./target/site/jacoco/jacoco.xml
        flags: unittests
        name: codecov-umbrella
        
  frontend-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: csap-apidoc-ui/package-lock.json

    - name: Install dependencies
      working-directory: csap-apidoc-ui
      run: npm ci

    - name: Type check & build
      working-directory: csap-apidoc-ui
      run: npm run build

    - name: Run unit tests
      working-directory: csap-apidoc-ui
      run: npm test
      
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
        
    - name: Run Checkstyle
      run: mvn -B checkstyle:check || true
      
    - name: Run SpotBugs
      run: mvn -B spotbugs:check || true

