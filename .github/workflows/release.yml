name: Release to Maven Central

# Publish the reactor (all modules) to Maven Central via the Sonatype Central
# Portal. Triggered manually after a release-cut PR is merged.
#
# Prerequisites (see docs/guides/PUBLISHING.md for the full walkthrough):
#   * `pom.xml` version = the release to cut (e.g. `1.0.0`; no `-SNAPSHOT`)
#   * GitHub Actions secrets configured:
#       - CENTRAL_USERNAME, CENTRAL_PASSWORD — User Token from the Central Portal
#       - GPG_PRIVATE_KEY                    — armored private key (`gpg --armor --export-secret-keys <keyid>`)
#       - GPG_PASSPHRASE                     — passphrase for that key
#   * Namespace `ai.csap` verified on Central (it is, as of 2026-04)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version — must match <version> in pom.xml (e.g. 1.0.0)"
        required: true
        default: "1.0.0"
      dry_run:
        description: "If true, build + sign locally but skip the upload to Central"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read

jobs:
  publish:
    name: Deploy to Central Portal
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 + Central credentials + GPG
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          # setup-java writes a <server id="central"> block into ~/.m2/settings.xml
          # bound to these env-var names, which the central-publishing plugin picks
          # up automatically. Same for the GPG key — setup-java imports it into
          # the runner's keyring before the build.
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Verify pom version matches input
        run: |
          set -euo pipefail
          POM_VERSION=$(mvn -q -N -Dexec.executable=echo \
            -Dexec.args='${project.version}' \
            --non-recursive exec:exec 2>/dev/null | tail -1)
          echo "pom.xml version     = $POM_VERSION"
          echo "workflow input      = ${{ inputs.version }}"
          if [ "$POM_VERSION" != "${{ inputs.version }}" ]; then
            echo "::error::version mismatch — aborting"
            exit 1
          fi
          if [[ "$POM_VERSION" == *-SNAPSHOT ]]; then
            echo "::error::cannot release a -SNAPSHOT version to Central"
            exit 1
          fi

      - name: Build + sign (dry-run)
        if: inputs.dry_run == 'true'
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mvn -B -P release -DskipTests clean verify \
              -Dgpg.passphrase="$GPG_PASSPHRASE"

      - name: Deploy to Central
        if: inputs.dry_run != 'true'
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mvn -B -P release -DskipTests clean deploy \
              -Dgpg.passphrase="$GPG_PASSPHRASE"

      - name: Create git tag
        if: inputs.dry_run != 'true' && success()
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"
