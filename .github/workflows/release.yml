name: Release to Maven Central

on:
  # Manual trigger: supply version and optional dry-run flag
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.0)"
        required: true
        type: string
      dry_run:
        description: "Dry run — build & sign without publishing"
        required: false
        default: false
        type: boolean

  # Automatic trigger on semver tags (e.g. v1.2.0)
  push:
    tags:
      - "v*.*.*"

# Only one release at a time
concurrency:
  group: release
  cancel-in-progress: false

env:
  JAVA_VERSION: "17"
  JAVA_DISTRIBUTION: "temurin"
  MAVEN_OPTS: "-Xmx2g -XX:+TieredCompilation -XX:TieredStopAtLevel=1"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Validate — run the full build + tests on Java 17 before touching OSSRH
  # ──────────────────────────────────────────────────────────────────────────
  validate:
    name: Validate (build + test)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Build and verify (tests enabled)
        run: mvn -B clean verify --file pom.xml -DskipTests=false

      - name: Write job summary
        if: always()
        run: |
          echo "## Validate result" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch/tag: \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Java: ${{ env.JAVA_VERSION }}" >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Release — sign and publish to Maven Central (OSSRH / Sonatype)
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: validate

    # Required secrets:
    #   GPG_PRIVATE_KEY  — ASCII-armored GPG private key for artifact signing
    #   GPG_PASSPHRASE   — Passphrase for the GPG key
    #   OSSRH_USERNAME   — Sonatype OSSRH username (or Central Portal token user)
    #   OSSRH_PASSWORD   — Sonatype OSSRH password / token
    #   GITHUB_TOKEN     — Automatically provided by GitHub Actions

    permissions:
      contents: write   # needed to create a GitHub Release

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }} with GPG
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      # Resolve the version to publish:
      #   • workflow_dispatch  → use the manually supplied input
      #   • tag push (v1.2.0)  → strip the leading "v"
      - name: Resolve release version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Tag name is "v1.2.0"; strip the leading "v"
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Stamp version in all POMs
        run: |
          mvn -B versions:set \
            -DnewVersion="${VERSION}" \
            -DgenerateBackupPoms=false \
            --file pom.xml

      # ── Real publish ──────────────────────────────────────────────────────
      - name: Deploy to OSSRH (Maven Central)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mvn -B deploy \
            -P release \
            --file pom.xml \
            --settings .github/maven-settings.xml \
            -Dgpg.passphrase="${GPG_PASSPHRASE}" \
            -DskipTests=true

      # ── Dry-run: build + sign locally, no remote upload ──────────────────
      - name: Package only (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "⚠️  DRY RUN — artifacts will be built and signed but NOT uploaded."
          mvn -B package \
            -P release \
            --file pom.xml \
            -Dgpg.passphrase="${GPG_PASSPHRASE}" \
            -DskipTests=true

      # ── GitHub Release (only on tag push, not dry-run) ───────────────────
      - name: Create GitHub Release
        if: >-
          ${{ github.event_name == 'push' &&
              startsWith(github.ref, 'refs/tags/') &&
              github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "CSAP Framework API Doc ${{ steps.version.outputs.version }}"
          generate_release_notes: true
          body: |
            ## CSAP Framework API Doc v${{ steps.version.outputs.version }}

            ### Maven coordinates

            ```xml
            <!-- Boot starter (Spring Boot 3) -->
            <dependency>
              <groupId>ai.csap.apidoc.boot</groupId>
              <artifactId>csap-apidoc-boot-starter</artifactId>
              <version>${{ steps.version.outputs.version }}</version>
            </dependency>

            <!-- Core library -->
            <dependency>
              <groupId>ai.csap.apidoc</groupId>
              <artifactId>csap-apidoc-core</artifactId>
              <version>${{ steps.version.outputs.version }}</version>
            </dependency>
            ```

            Artifacts are published to [Maven Central](https://central.sonatype.com/search?q=ai.csap.apidoc).
          files: |
            **/target/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write release summary
        if: always()
        run: |
          echo "## Release summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trigger | \`${{ github.event_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dry run | \`${{ github.event.inputs.dry_run }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Required secrets" >> "$GITHUB_STEP_SUMMARY"
          echo "| Secret | Purpose |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`GPG_PRIVATE_KEY\` | ASCII-armored GPG private key for signing artifacts |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`GPG_PASSPHRASE\` | GPG key passphrase |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`OSSRH_USERNAME\` | Sonatype OSSRH username (or Central Portal token user) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`OSSRH_PASSWORD\` | Sonatype OSSRH password / token |" >> "$GITHUB_STEP_SUMMARY"
