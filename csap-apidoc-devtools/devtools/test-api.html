<!DOCTYPE html>
<html>
<head>
    <title>API测试</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #ddd; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
    </style>
</head>
<body>
    <h1>API 接口测试</h1>
    <div id="results"></div>
    
    <script>
        const results = document.getElementById('results');
        
        // 测试1: scannerApi
        fetch('/api/csap/yaml/scannerApi?className=')
            .then(r => r.json())
            .then(data => {
                const div = document.createElement('div');
                div.className = 'test ' + (data.success ? 'success' : 'error');
                div.innerHTML = `
                    <h3>✓ scannerApi 测试</h3>
                    <p>状态: ${data.success ? '成功' : '失败'}</p>
                    <p>Controller数量: ${data.data?.length || 0}</p>
                    <p>第一个: ${data.data?.[0]?.simpleName || 'N/A'}</p>
                `;
                results.appendChild(div);
                
                // 测试2: getApiDocList
                if (data.data && data.data[0]) {
                    return fetch('/api/csap/apidoc/' + data.data[0].name + '?className=true&key=');
                }
            })
            .then(r => r ? r.json() : null)
            .then(data => {
                if (data) {
                    const div = document.createElement('div');
                    div.className = 'test ' + (data.success ? 'success' : 'error');
                    div.innerHTML = `
                        <h3>✓ getApiDocList 测试</h3>
                        <p>状态: ${data.success ? '成功' : '失败'}</p>
                        <p>apiList数量: ${data.data?.apiList?.length || 0}</p>
                        <p>方法数量: ${data.data?.apiList?.[0]?.methodList?.length || 0}</p>
                        <p>第一个方法: ${data.data?.apiList?.[0]?.methodList?.[0]?.name || 'N/A'}</p>
                    `;
                    results.appendChild(div);
                }
            })
            .catch(err => {
                const div = document.createElement('div');
                div.className = 'test error';
                div.innerHTML = `<h3>✗ 测试失败</h3><p>${err.message}</p>`;
                results.appendChild(div);
            });
    </script>
</body>
</html>
