##接口方法
ai.csap.apidoc.web.YamlController:
  getYaml:
    ## 名称描述
    value: 获取信息
    ## 包含类名和方法名称 标识
    key: getYaml
    ## 实际名称
    name: getYaml
    ##方法请求的类型
    methods:
      - GET
    ## 路径
    paths:
      - getYaml
    ## 描述
    description: 描述
    ##筛选条件
    search:
      - 获取信息
      - getYaml
    ##标签
    tags:
      - 获取信息
      - getYaml
    ##参数类型
    paramType: QUERY
    paramTypes:
      - QUERY
    ##api状态
    status: FINISH
    ##当前接口分组
    group:
      - yaml
      - test
    ##版本
    version:
      - 1.0
      - 2.0
    ##是否隐藏
    hidden: false
    ##请求参数
    request:
      ## 多个参数
      - value: 测试model
        name: yamlModel
        description: 测试model
        modelType: ARRAY
        group:
          - yaml
        version:
          - 1.0
        yamlParameter:
          name:
            ##是否必传
            required: true
            ##参数类型
            paramType: QUERY
            group:
              - yaml
            version:
              - 1.0
            ##验证属性
            validate:
              - type: NOT_NULL
                level: 2
                message: 名称不能为空
                code: 109
              - type: NOT_EMPTY
                level: 1
                message: 名称不能为空字符
                code: 107
              - type: PATTERN
                level: 3
                pattern: ^[0-9]*$
                message: 请输入0-9的整数
                code: 106
          sex:
            ##是否必传
            required: true
            ##参数类型
            paramType: QUERY
    ##返回参数
    response:
      - value: 测试model
        name: yamlModel
        description: 测试model
        modelType: OBJECT
        group:
          - yaml
        version:
          - 1.0
        yamlParameter:
          sex:
            ##是否必传
            required: true
